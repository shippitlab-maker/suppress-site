<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Página não encontrada — Suppress</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Poppins',system-ui,sans-serif;background:#0a0a0c;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
  .wrap{max-width:520px}
  .code{font-size:clamp(5rem,15vw,9rem);font-weight:700;line-height:1;color:#FF6600;margin-bottom:.5rem}
  h1{font-size:clamp(1.2rem,3vw,1.8rem);font-weight:600;margin-bottom:1rem}
  p{color:rgba(255,255,255,.65);line-height:1.6;margin-bottom:2rem}
  a{display:inline-flex;align-items:center;gap:.5rem;background:#FF6600;color:#fff;padding:.85rem 2rem;border-radius:6px;text-decoration:none;font-weight:600;font-size:.95rem;transition:background .2s}
  a:hover{background:#cc5200}
  a svg{width:18px;height:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>Página não encontrada</h1>
  <p>O conteúdo que você procura pode ter sido movido ou não existe mais. Volte à página inicial para encontrar o que precisa.</p>
  <a href="/">
    Voltar ao início
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </a>
</div>
</body>
</html>
